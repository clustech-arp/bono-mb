<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bono Festival MB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a73e8,#0d47a1)}
  .login-card{background:#fff;border-radius:16px;padding:36px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.25);text-align:center}
  .login-card img.logo{width:90px;height:90px;object-fit:contain;margin-bottom:10px;border-radius:8px}
  .login-card h1{color:#1a73e8;font-size:20px;margin-bottom:4px}
  .login-card p{color:#888;font-size:13px;margin-bottom:22px}
  .field-group{margin-bottom:14px;text-align:left}
  .field-group label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field-group input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;outline:none;transition:border-color .2s;letter-spacing:2px}
  .field-group input:focus{border-color:#1a73e8}
  .btn-login{width:100%;padding:13px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
  .btn-login:disabled{background:#aaa;cursor:not-allowed}
  .login-error{color:#d32f2f;font-size:13px;margin-top:10px;min-height:18px;text-align:center}

  /* APP */
  #app{display:none;flex-direction:column;min-height:100vh}
  header{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-left img{width:36px;height:36px;object-fit:contain;border-radius:4px}
  header h1{font-size:16px;font-weight:700}
  .header-right{display:flex;align-items:center;gap:8px}
  .seller-badge{background:rgba(255,255,255,.22);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .btn-logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  .btn-logout:hover{background:rgba(255,255,255,.25)}

  .controls{padding:10px 14px;background:#fff;border-bottom:1px solid #e0e0e0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:57px;z-index:9}
  .lote-badge{background:#e3f2fd;color:#1a73e8;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
  .stats{display:flex;gap:8px}
  .stat{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .stat.libres{background:rgba(76,175,80,.25);color:#2e7d32}
  .stat.vendidos{background:rgba(244,67,54,.2);color:#c62828}
  .btn-suggest{padding:7px 12px;background:#43a047;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;margin-left:auto}

  /* GRID */
  .grid{padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:5px}
  .nc{padding:8px 2px;border-radius:8px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s,background .15s;user-select:none;border:2px solid transparent;position:relative}
  .nc.libre{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
  .nc.libre:hover{background:#c8e6c9}
  .nc.selected{background:#1a73e8;color:#fff;border-color:#1557b0;transform:scale(1.05)}
  .nc.selected::after{content:'✓';position:absolute;top:-4px;right:-4px;background:#43a047;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:16px}
  .nc.vendido{background:#ffebee;color:#c62828;border-color:#ef9a9a;cursor:default;opacity:.6}
  .nc.hidden{display:none!important}

  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px;color:#777}
  .spinner{width:44px;height:44px;border:4px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* BARRA SELECCIÓN */
  .sel-bar{position:fixed;bottom:0;left:0;right:0;background:#1a73e8;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:50;transform:translateY(100%);transition:transform .3s;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
  .sel-bar.visible{transform:translateY(0)}
  .sel-info{font-size:15px;font-weight:600}
  .sel-info span{background:rgba(255,255,255,.25);padding:2px 10px;border-radius:20px;margin-left:8px;font-size:16px;font-weight:800}
  .sel-actions{display:flex;gap:10px}
  .btn-clear{padding:9px 16px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}
  .btn-registrar{padding:9px 20px;background:#43a047;border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}

  /* MODALS */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:16px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
  .modal h2{color:#1a73e8;margin-bottom:6px;font-size:19px}
  .modal .subtitle{color:#888;font-size:13px;margin-bottom:18px}
  .nums-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .num-chip{background:#e3f2fd;color:#1a73e8;border-radius:6px;padding:4px 10px;font-size:14px;font-weight:800;letter-spacing:2px}
  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .fg input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none}
  .fg input:focus{border-color:#1a73e8}
  .fg input:disabled{background:#f5f5f5;color:#555;font-weight:600}
  .mactions{display:flex;gap:10px;margin-top:18px}
  .btn-cancel{flex:1;padding:12px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:15px}
  .btn-confirm{flex:2;padding:12px;background:#43a047;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700}
  .btn-confirm:disabled{background:#bbb;cursor:not-allowed}

  /* QR MODAL */
  #qrModal .modal{text-align:center}
  .qr-nums{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px}
  .qr-num-chip{background:#e3f2fd;color:#1a73e8;border-radius:6px;padding:6px 12px;font-size:18px;font-weight:900;letter-spacing:3px}
  .qr-buyer{font-size:15px;color:#333;font-weight:600;margin-bottom:4px}
  .qr-meta{font-size:12px;color:#888;margin-bottom:14px}
  #qrBox{margin:0 auto 12px;width:200px;height:200px}
  .qr-url-txt{font-size:10px;color:#ccc;margin-bottom:14px;word-break:break-all}
  .btn-wa{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
  .btn-print-qr{width:100%;padding:10px;background:#fff;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:8px}
  .btn-done{width:100%;padding:10px;background:#f5f5f5;border:none;border-radius:8px;cursor:pointer;font-size:14px}

  .live-dot{width:8px;height:8px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:11px 22px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}

  @media print{
    #loginScreen,header,.controls,.sel-bar,#saleModal{display:none!important}
    .grid{display:none!important}
    #qrModal{position:static!important;background:#fff!important}
    #qrModal .modal{box-shadow:none!important;max-height:none!important}
    .overlay{display:block!important;position:static!important;background:none!important}
    .btn-wa,.btn-print-qr,.btn-done{display:none!important}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img src="logo.png" class="logo" alt="ESCMB">
    <h1>Bono Festival MB</h1>
    <p>Ingresá tus credenciales de vendedor</p>
    <form id="loginForm" onsubmit="doLogin(event)" autocomplete="on">
      <div class="field-group">
        <label>Últimos 4 dígitos del DNI</label>
        <input type="text" id="dniInput" name="username" autocomplete="username"
               inputmode="numeric" maxlength="4" placeholder="••••" required>
      </div>
      <div class="field-group">
        <label>PIN (4 dígitos)</label>
        <input type="password" id="pinInput" name="password" autocomplete="current-password"
               inputmode="numeric" maxlength="4" placeholder="••••" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Ingresar</button>
    </form>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:flex;flex-direction:column">
  <header>
    <div class="header-left">
      <img src="logo.png" alt="MB">
      <h1><span class="live-dot"></span>Bono Festival MB</h1>
    </div>
    <div class="header-right">
      <span class="seller-badge" id="sellerBadge">👤 —</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="controls">
    <span class="lote-badge" id="loteBadge">Lote —</span>
    <div class="stats">
      <span class="stat libres" id="stLibres">— libres</span>
      <span class="stat vendidos" id="stVendidos">— vendidos</span>
    </div>
    <button class="btn-suggest" onclick="suggestNumber()">🎲 Sugerir</button>
  </div>

  <div id="grid" class="grid">
    <div class="loading"><div class="spinner"></div><span>Conectando...</span></div>
  </div>
</div>

<!-- Barra selección -->
<div class="sel-bar" id="selBar">
  <div class="sel-info">Seleccionados <span id="selCount">0</span></div>
  <div class="sel-actions">
    <button class="btn-clear" onclick="clearSelection()">✕ Limpiar</button>
    <button class="btn-registrar" onclick="openSale()">Registrar Venta</button>
  </div>
</div>

<!-- Modal venta -->
<div id="saleModal" class="overlay">
  <div class="modal">
    <h2>Registrar Venta</h2>
    <div class="subtitle" id="saleSubtitle"></div>
    <div class="nums-preview" id="numsPreview"></div>
    <div class="fg">
      <label>Nombre del comprador *</label>
      <input type="text" id="buyerName" placeholder="Juan García" oninput="validateForm()">
    </div>
    <div class="fg">
      <label>Teléfono / WhatsApp</label>
      <input type="text" id="buyerPhone" placeholder="11 2345-6789">
    </div>
    <div class="fg">
      <label>Vendedor</label>
      <input type="text" id="sellerNameField" disabled>
    </div>
    <div class="mactions">
      <button class="btn-cancel" onclick="closeSale()">Cancelar</button>
      <button class="btn-confirm" id="btnConfirm" onclick="confirmSale()" disabled>✔ Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal QR -->
<div id="qrModal" class="overlay">
  <div class="modal">
    <div class="qr-nums" id="qrNums"></div>
    <div class="qr-buyer" id="qrBuyer"></div>
    <div class="qr-meta" id="qrMeta"></div>
    <div id="qrBox"></div>
    <div class="qr-url-txt" id="qrUrlTxt"></div>
    <button class="btn-wa" onclick="shareWA()">📱 Compartir por WhatsApp</button>
    <button class="btn-print-qr" onclick="window.print()">🖨️ Imprimir comprobante</button>
    <button class="btn-done" onclick="closeQr()">Cerrar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCAxCy8vAijdXs-euawf2lh83nVvghayqU",
    authDomain: "bono-mb-v2.firebaseapp.com",
    databaseURL: "https://bono-mb-v2-default-rtdb.firebaseio.com",
    projectId: "bono-mb-v2",
    storageBucket: "bono-mb-v2.firebasestorage.app",
    messagingSenderId: "426895052978",
    appId: "1:426895052978:web:433f459af5509c1c8db9ab"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let session = null;       // { key, nombre, lotes: [{desde, hasta},...] }
  let vendidos = {};        // { numInt: true }
  let selected = new Set(); // números seleccionados
  let lastSale = null;
  let gridReady = false;

  function getLotes(d) {
    if (d.lotes) return Object.values(d.lotes);
    if (d.loteDesde !== undefined && d.loteHasta !== undefined)
      return [{ desde: d.loteDesde, hasta: d.loteHasta }];
    return [];
  }

  // ── Sesión persistente ────────────────────────────────────────
  window.onload = function() {
    const saved = localStorage.getItem('mbSession');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        db.ref('vendedores/' + s.key + '/activo').once('value').then(snap => {
          if (snap.val() !== false) {
            session = s;
            startApp();
          } else {
            localStorage.removeItem('mbSession');
          }
        }).catch(() => {});
      } catch(e) {
        localStorage.removeItem('mbSession');
      }
    }
  };

  // ── Login ─────────────────────────────────────────────────────
  function doLogin(e) {
    e.preventDefault();
    const dni = document.getElementById('dniInput').value.trim();
    const pin = document.getElementById('pinInput').value.trim();
    if (!dni || !pin) return;
    const btn = document.getElementById('btnLogin');
    btn.disabled = true; btn.textContent = 'Verificando...';
    document.getElementById('loginError').textContent = '';

    // Cargar todos los vendedores y buscar por DNI + PIN
    db.ref('vendedores').once('value').then(snap => {
      let found = null;
      snap.forEach(child => {
        const d = child.val();
        if (String(d.dni) === dni && String(d.pin) === pin && d.activo !== false) {
          found = { key: child.key, nombre: d.nombre, lotes: getLotes(d) };
        }
      });

      if (found) {
        session = found;
        localStorage.setItem('mbSession', JSON.stringify(session));
        startApp();
      } else {
        document.getElementById('loginError').textContent = '❌ DNI o PIN incorrecto, o acceso desactivado';
        btn.disabled = false; btn.textContent = 'Ingresar';
      }
    }).catch(() => {
      document.getElementById('loginError').textContent = '⚠️ Error de conexión';
      btn.disabled = false; btn.textContent = 'Ingresar';
    });
  }

  function doLogout() {
    localStorage.removeItem('mbSession');
    location.reload();
  }

  // ── Iniciar app ───────────────────────────────────────────────
  function startApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sellerBadge').textContent = '👤 ' + session.nombre;
    document.getElementById('sellerNameField').value = session.nombre;
    document.getElementById('loteBadge').textContent =
      session.lotes.map(l => String(l.desde).padStart(4,'0') + '–' + String(l.hasta).padStart(4,'0')).join(' | ');
    initGrid();
    listenSales();
  }

  // ── Grilla ────────────────────────────────────────────────────
  function initGrid() {
    let html = '';
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        const n = String(i).padStart(4,'0');
        html += `<div class="nc libre" id="n${i}" onclick="toggleSelect(${i})">${n}</div>`;
      }
    });
    document.getElementById('grid').innerHTML = html;
    gridReady = true;
    updateStats();
  }

  function listenSales() {
    db.ref('vendidos').on('child_added', snap => {
      const num = parseInt(snap.key, 10);
      if (!vendidos[num]) {
        vendidos[num] = true;
        if (gridReady) markSold(num);
        updateStats();
      }
    });
  }

  function markSold(num) {
    const el = document.getElementById('n' + num);
    if (!el) return;
    el.className = 'nc vendido';
    el.onclick = null;
    selected.delete(num);
    updateSelBar();
  }

  function updateStats() {
    let total = 0, vendCount = 0;
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        total++;
        if (vendidos[i]) vendCount++;
      }
    });
    document.getElementById('stLibres').textContent = (total - vendCount) + ' libres';
    document.getElementById('stVendidos').textContent = vendCount + ' vendidos';
  }

  // ── Selección múltiple ────────────────────────────────────────
  function toggleSelect(n) {
    if (vendidos[n]) return;
    const el = document.getElementById('n' + n);
    if (selected.has(n)) {
      selected.delete(n);
      el.classList.remove('selected');
      el.classList.add('libre');
    } else {
      selected.add(n);
      el.classList.remove('libre');
      el.classList.add('selected');
    }
    updateSelBar();
  }

  function updateSelBar() {
    const bar = document.getElementById('selBar');
    document.getElementById('selCount').textContent = selected.size;
    bar.classList.toggle('visible', selected.size > 0);
  }

  function clearSelection() {
    selected.forEach(n => {
      const el = document.getElementById('n' + n);
      if (el) { el.classList.remove('selected'); el.classList.add('libre'); }
    });
    selected.clear();
    updateSelBar();
  }

  function suggestNumber() {
    const libres = [];
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        if (!vendidos[i] && !selected.has(i)) libres.push(i);
      }
    });
    if (!libres.length) { showToast('No quedan números libres'); return; }
    const n = libres[Math.floor(Math.random() * libres.length)];
    toggleSelect(n);
    document.getElementById('n' + n).scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Modal venta ───────────────────────────────────────────────
  function openSale() {
    if (!selected.size) return;
    const nums = [...selected].sort((a,b) => a-b);
    document.getElementById('saleSubtitle').textContent =
      nums.length === 1 ? '1 número seleccionado' : nums.length + ' números seleccionados';
    document.getElementById('numsPreview').innerHTML =
      nums.map(n => `<span class="num-chip">${String(n).padStart(4,'0')}</span>`).join('');
    document.getElementById('buyerName').value = '';
    document.getElementById('buyerPhone').value = '';
    document.getElementById('btnConfirm').disabled = true;
    document.getElementById('saleModal').classList.add('open');
    setTimeout(() => document.getElementById('buyerName').focus(), 100);
  }

  function validateForm() {
    document.getElementById('btnConfirm').disabled =
      !document.getElementById('buyerName').value.trim();
  }

  function closeSale() {
    document.getElementById('saleModal').classList.remove('open');
  }

  async function confirmSale() {
    const btn = document.getElementById('btnConfirm');
    btn.disabled = true; btn.textContent = '⏳ Registrando...';

    const nombre   = document.getElementById('buyerName').value.trim();
    const telefono = document.getElementById('buyerPhone').value.trim();
    const vendedor = session.nombre;
    const nums     = [...selected].sort((a,b) => a-b);
    const codigo   = generateCode();
    const fecha    = new Date().toLocaleString('es-AR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const numKeys  = nums.map(n => String(n).padStart(4,'0'));

    // Registrar cada número con transacción atómica
    const resultados = [];
    for (const numKey of numKeys) {
      await new Promise(resolve => {
        db.ref('vendidos/' + numKey).transaction(current => {
          if (current !== null) return; // ya vendido
          return { nombre, telefono, vendedor, fecha, codigoCompra: codigo };
        }, (err, committed) => {
          resultados.push({ num: numKey, ok: committed && !err });
          resolve();
        });
      });
    }

    const vendidosOk = resultados.filter(r => r.ok).map(r => r.num);
    const yaVendidos = resultados.filter(r => !r.ok).map(r => r.num);

    if (yaVendidos.length) {
      yaVendidos.forEach(n => {
        const i = parseInt(n);
        vendidos[i] = true;
        markSold(i);
      });
    }

    btn.textContent = '✔ Confirmar';

    if (!vendidosOk.length) {
      showToast('⚠️ Todos los números ya fueron vendidos');
      btn.disabled = false;
      return;
    }

    // Guardar compra grupal
    const compra = { numeros: vendidosOk, nombre, telefono, vendedor, fecha };
    await db.ref('compras/' + codigo).set(compra);
    await db.ref('codigos/' + codigo).set(vendidosOk);

    const verifyUrl = window.location.origin + '/verify_v2.html?code=' + codigo;
    lastSale = { numeros: vendidosOk, nombre, vendedor, fecha, codigo, verifyUrl };

    closeSale();
    clearSelection();

    if (yaVendidos.length) {
      showToast(`⚠️ ${yaVendidos.length} número(s) ya estaban vendidos`);
    }

    showQR(lastSale);
  }

  // ── QR ────────────────────────────────────────────────────────
  function showQR(sale) {
    document.getElementById('qrNums').innerHTML =
      sale.numeros.map(n => `<span class="qr-num-chip">${n}</span>`).join('');
    document.getElementById('qrBuyer').textContent = sale.nombre;
    document.getElementById('qrMeta').textContent = `Vendedor: ${sale.vendedor} · ${sale.fecha}`;
    document.getElementById('qrUrlTxt').textContent = sale.verifyUrl;
    const box = document.getElementById('qrBox');
    box.innerHTML = '';
    new QRCode(box, { text: sale.verifyUrl, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('qrModal').classList.add('open');
  }

  function closeQr() {
    document.getElementById('qrModal').classList.remove('open');
    document.getElementById('qrBox').innerHTML = '';
  }

  function shareWA() {
    if (!lastSale) return;
    const nums = lastSale.numeros.join(', ');
    const msg = `🎟️ *Bono Festival MB*\n\n*Número${lastSale.numeros.length > 1 ? 's' : ''}: ${nums}*\nComprador: ${lastSale.nombre}\nFecha: ${lastSale.fecha}\n\n✅ Verificá tu compra:\n${lastSale.verifyUrl}`;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }

  // ── Utils ─────────────────────────────────────────────────────
  function generateCode() {
    return Array.from(crypto.getRandomValues(new Uint8Array(12)))
      .map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
