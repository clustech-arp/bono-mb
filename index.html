<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bono Festival MB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a73e8,#0d47a1)}
  .login-card{background:#fff;border-radius:16px;padding:36px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.25);text-align:center}
  .login-card img.logo{width:90px;height:90px;object-fit:contain;margin-bottom:10px;border-radius:8px}
  .login-card h1{color:#1a73e8;font-size:20px;margin-bottom:4px}
  .login-card p{color:#888;font-size:13px;margin-bottom:22px}
  .field-group{margin-bottom:14px;text-align:left}
  .field-group label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field-group input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;outline:none;transition:border-color .2s;letter-spacing:2px}
  .field-group input:focus{border-color:#1a73e8}
  .btn-login{width:100%;padding:13px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
  .btn-login:disabled{background:#aaa;cursor:not-allowed}
  .login-error{color:#d32f2f;font-size:13px;margin-top:10px;min-height:18px;text-align:center}

  /* APP */
  #app{display:none;flex-direction:column;min-height:100vh}
  header{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .header-left{display:flex;flex-direction:column;gap:2px}
  .header-left h1{font-size:16px;font-weight:800}
  #sellerBadge{font-size:12px;opacity:.85}
  #loteBadge{font-size:11px;opacity:.75}
  .header-right{display:flex;gap:8px;align-items:center}
  .btn-hdr{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}

  /* STATS */
  .stats-bar{display:flex;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #e8e8e8}
  .stat{flex:1;text-align:center;font-size:12px;color:#888}
  .stat strong{display:block;font-size:20px;font-weight:900;color:#1a73e8}

  /* GRID */
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;padding:12px;flex:1}
  .nc{border-radius:8px;padding:10px 4px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;user-select:none;position:relative}
  .nc.libre{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}
  .nc.libre:hover{background:#c8e6c9;transform:scale(1.05)}
  .nc.vendido{background:#ffebee;color:#c62828;border:2px solid #ef9a9a;cursor:not-allowed;opacity:.7}
  .nc.selected{background:#1a73e8;color:#fff;border:2px solid #1557b0;transform:scale(1.08)}
  .nc.selected::after{content:'✓';position:absolute;top:2px;right:4px;font-size:10px}

  /* SELECTION BAR */
  #selBar{position:fixed;bottom:0;left:0;right:0;background:#1a73e8;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s;z-index:20;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
  #selBar.visible{transform:translateY(0)}
  #selBar .sel-info{font-size:14px;font-weight:700}
  #selBar .sel-btns{display:flex;gap:8px}
  .btn-sel{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-clear{background:rgba(255,255,255,.2);color:#fff}
  .btn-register{background:#fff;color:#1a73e8}

  /* MODAL VENTA */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;transform:translateY(40px);transition:transform .3s}
  .modal-overlay.open .modal-sheet{transform:translateY(0)}
  .modal-sheet h2{font-size:18px;font-weight:800;margin-bottom:4px}
  .modal-sheet p{font-size:13px;color:#888;margin-bottom:16px}
  .nums-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .num-chip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:800;color:#1a73e8}
  .form-field{margin-bottom:12px}
  .form-field label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:5px}
  .form-field input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s}
  .form-field input:focus{border-color:#1a73e8}
  .seller-display{background:#f0f4ff;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;color:#1a73e8;margin-bottom:16px}
  .modal-actions{display:flex;gap:8px}
  .modal-actions button{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
  .btn-cancel{background:#f0f0f0;color:#555}
  .btn-confirm{background:#1a73e8;color:#fff}
  .btn-confirm:disabled{background:#aaa;cursor:not-allowed}

  /* MODAL QR */
  #qrModal .modal-sheet{text-align:center}
  #qrModal h2{margin-bottom:8px}
  .qr-nums{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}
  .qr-num-chip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:8px;padding:6px 12px;font-size:18px;font-weight:900;color:#1a73e8}
  #qrBox{display:flex;justify-content:center;margin:12px 0}
  #qrBox img{border-radius:8px}
  .qr-url{font-size:10px;color:#aaa;word-break:break-all;margin-bottom:16px}
  .qr-actions{display:flex;gap:8px;margin-top:8px}
  .btn-wa{flex:1;background:#25d366;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-close-qr{flex:1;background:#f0f0f0;color:#555;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}

  /* TOAST */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:50;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img src="logo.png" class="logo" alt="ESCMB" onerror="this.style.display='none'">
    <h1>Bono Festival MB</h1>
    <p>Ingresá tus datos para continuar</p>
    <form onsubmit="doLogin(event)" autocomplete="on">
      <div class="field-group">
        <label>Últimos 4 dígitos del DNI</label>
        <input id="dniInput" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{4}"
               autocomplete="username" placeholder="1234" required>
      </div>
      <div class="field-group">
        <label>PIN (4 dígitos)</label>
        <input id="pinInput" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}"
               autocomplete="current-password" placeholder="••••" required>
      </div>
      <button class="btn-login" id="btnLogin" type="submit">Ingresar</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <h1><img src="logo.png" style="width:24px;height:24px;vertical-align:middle;border-radius:3px;margin-right:6px" alt="">Bono Festival MB</h1>
      <span id="sellerBadge"></span>
      <span id="loteBadge"></span>
    </div>
    <div class="header-right">
      <button class="btn-hdr" onclick="toggleSoloLibres()" id="btnLibres">Ver libres</button>
      <button class="btn-hdr" onclick="suggestNumber()">🎲 Sugerir</button>
      <button class="btn-hdr" id="btnLastQR" onclick="reopenLastQR()" style="display:none"><img src="logo.png" style="width:16px;height:16px;vertical-align:middle;border-radius:2px;margin-right:4px" alt=""> Último recibo</button>
      <button class="btn-hdr" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><strong id="stLibres">—</strong>Libres</div>
    <div class="stat"><strong id="stVendidos">—</strong>Vendidos</div>
  </div>

  <div id="grid"></div>

  <div id="selBar">
    <div class="sel-info">✅ <span id="selCount">0</span> seleccionado(s)</div>
    <div class="sel-btns">
      <button class="btn-sel btn-clear" onclick="clearSelection()">Limpiar</button>
      <button class="btn-sel btn-register" onclick="openSale()">Registrar venta</button>
    </div>
  </div>
</div>

<!-- MODAL VENTA -->
<div class="modal-overlay" id="saleModal">
  <div class="modal-sheet">
    <h2>Registrar Venta</h2>
    <p id="saleSubtitle"></p>
    <div class="nums-preview" id="numsPreview"></div>
    <div class="seller-display">👤 Vendedor: <span id="sellerNameField"></span></div>
    <div class="form-field">
      <label>Nombre del comprador *</label>
      <input type="text" id="buyerName" placeholder="Nombre completo" oninput="validateForm()" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Teléfono (opcional)</label>
      <input type="tel" id="buyerPhone" placeholder="Ej: 351 1234567" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSale()">Cancelar</button>
      <button class="btn-confirm" id="btnConfirm" onclick="confirmSale()" disabled>✔ Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL QR -->
<div class="modal-overlay" id="qrModal">
  <div class="modal-sheet">
    <div style="text-align:center;margin-bottom:8px"><img src="logo.png" style="width:72px;height:72px;object-fit:contain;border-radius:10px" alt=""></div>
    <h2>Venta registrada</h2>
    <div class="qr-nums" id="qrNums"></div>
    <div id="qrBox"></div>
    <div class="qr-url" id="qrUrlTxt"></div>
    <div style="font-size:13px;color:#555;margin-bottom:4px" id="qrBuyer"></div>
    <div style="font-size:12px;color:#aaa" id="qrMeta"></div>
    <div class="qr-actions">
      <button class="btn-wa" onclick="shareWA()">📲 Enviar por WhatsApp</button>
      <button class="btn-close-qr" onclick="closeQr()">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div style="position:fixed;bottom:6px;right:10px;font-size:10px;color:#bbb;z-index:999;pointer-events:none">v2.2 — 26/05/26</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCAxCy8vAijdXs-euawf2lh83nVvghayqU",
    authDomain: "bono-mb-v2.firebaseapp.com",
    databaseURL: "https://bono-mb-v2-default-rtdb.firebaseio.com",
    projectId: "bono-mb-v2",
    storageBucket: "bono-mb-v2.firebasestorage.app",
    messagingSenderId: "426895052978",
    appId: "1:426895052978:web:433f459af5509c1c8db9ab"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let session = null;       // { key, nombre, lotes: [{desde, hasta},...] }
  let vendidos = {};
  let selected = new Set();
  let lastSale = null;
  let gridReady = false;

  function getLotes(d) {
    if (d.lotes) return Object.values(d.lotes);
    if (d.loteDesde !== undefined && d.loteHasta !== undefined)
      return [{ desde: d.loteDesde, hasta: d.loteHasta }];
    return [];
  }

  // ── Sesión persistente ──────────────────────────────────
  window.onload = function() {
    const saved = localStorage.getItem('mbSession');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        db.ref('vendedores/' + s.key).once('value').then(snap => {
          if (snap.exists() && snap.val().activo !== false) {
            // Refrescar lotes desde Firebase por si cambiaron
            session = { key: s.key, nombre: s.nombre, lotes: getLotes(snap.val()) };
            localStorage.setItem('mbSession', JSON.stringify(session));
            startApp();
          } else {
            localStorage.removeItem('mbSession');
          }
        }).catch(() => {});
      } catch(e) { localStorage.removeItem('mbSession'); }
    }
  };

  // ── Login ───────────────────────────────────────────────
  function doLogin(e) {
    e.preventDefault();
    const dni = document.getElementById('dniInput').value.trim();
    const pin = document.getElementById('pinInput').value.trim();
    if (!dni || !pin) return;
    const btn = document.getElementById('btnLogin');
    btn.disabled = true; btn.textContent = 'Verificando...';
    document.getElementById('loginError').textContent = '';

    db.ref('vendedores').once('value').then(snap => {
      let found = null;
      snap.forEach(child => {
        const d = child.val();
        if (String(d.dni) === dni && String(d.pin) === pin && d.activo !== false) {
          found = { key: child.key, nombre: d.nombre, lotes: getLotes(d) };
        }
      });
      if (found) {
        session = found;
        localStorage.setItem('mbSession', JSON.stringify(session));
        startApp();
      } else {
        document.getElementById('loginError').textContent = '❌ DNI o PIN incorrecto, o acceso desactivado';
        btn.disabled = false; btn.textContent = 'Ingresar';
      }
    }).catch(() => {
      document.getElementById('loginError').textContent = '⚠️ Error de conexión';
      btn.disabled = false; btn.textContent = 'Ingresar';
    });
  }

  function doLogout() {
    localStorage.removeItem('mbSession');
    location.reload();
  }

  // ── Iniciar app ─────────────────────────────────────────
  function startApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sellerBadge').textContent = '👤 ' + session.nombre;
    document.getElementById('sellerNameField').textContent = session.nombre;
    document.getElementById('loteBadge').textContent =
      session.lotes.map(l => String(l.desde).padStart(4,'0') + '–' + String(l.hasta).padStart(4,'0')).join(' | ');
    initGrid();
    listenSales();
    checkLastSale();
  }

  // ── Grilla ──────────────────────────────────────────────
  function initGrid() {
    let html = '';
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        const n = String(i).padStart(4,'0');
        html += `<div class="nc libre" id="n${i}" onclick="toggleSelect(${i})">${n}</div>`;
      }
    });
    document.getElementById('grid').innerHTML = html;
    gridReady = true;
    updateStats();
  }

  function listenSales() {
    db.ref('vendidos').on('child_added', snap => {
      const num = parseInt(snap.key, 10);
      if (!vendidos[num]) {
        vendidos[num] = true;
        if (gridReady) markSold(num);
        updateStats();
      }
    });
  }

  function markSold(num) {
    const el = document.getElementById('n' + num);
    if (!el) return;
    el.className = 'nc vendido';
    el.onclick = null;
    selected.delete(num);
    updateSelBar();
  }

  function updateStats() {
    let total = 0, vendCount = 0;
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        total++;
        if (vendidos[i]) vendCount++;
      }
    });
    document.getElementById('stLibres').textContent = total - vendCount;
    document.getElementById('stVendidos').textContent = vendCount;
  }

  // ── Selección múltiple ──────────────────────────────────
  function toggleSelect(n) {
    if (vendidos[n]) return;
    const el = document.getElementById('n' + n);
    if (selected.has(n)) {
      selected.delete(n);
      el.classList.remove('selected'); el.classList.add('libre');
    } else {
      selected.add(n);
      el.classList.remove('libre'); el.classList.add('selected');
    }
    updateSelBar();
  }

  function updateSelBar() {
    document.getElementById('selCount').textContent = selected.size;
    document.getElementById('selBar').classList.toggle('visible', selected.size > 0);
  }

  function clearSelection() {
    selected.forEach(n => {
      const el = document.getElementById('n' + n);
      if (el) { el.classList.remove('selected'); el.classList.add('libre'); }
    });
    selected.clear();
    updateSelBar();
  }

  function suggestNumber() {
    const libres = [];
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        if (!vendidos[i] && !selected.has(i)) libres.push(i);
      }
    });
    if (!libres.length) { showToast('No quedan números libres'); return; }
    const n = libres[Math.floor(Math.random() * libres.length)];
    toggleSelect(n);
    document.getElementById('n' + n).scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Modal venta ─────────────────────────────────────────
  function openSale() {
    if (!selected.size) return;
    const nums = [...selected].sort((a,b) => a-b);
    document.getElementById('saleSubtitle').textContent =
      nums.length === 1 ? '1 número seleccionado' : nums.length + ' números seleccionados';
    document.getElementById('numsPreview').innerHTML =
      nums.map(n => `<span class="num-chip">${String(n).padStart(4,'0')}</span>`).join('');
    document.getElementById('buyerName').value = '';
    document.getElementById('buyerPhone').value = '';
    document.getElementById('btnConfirm').disabled = true;
    document.getElementById('saleModal').classList.add('open');
    setTimeout(() => document.getElementById('buyerName').focus(), 100);
  }

  function validateForm() {
    document.getElementById('btnConfirm').disabled =
      !document.getElementById('buyerName').value.trim();
  }

  function closeSale() {
    document.getElementById('saleModal').classList.remove('open');
  }

  async function confirmSale() {
    const btn = document.getElementById('btnConfirm');
    btn.disabled = true; btn.textContent = '⏳ Registrando...';

    const nombre   = document.getElementById('buyerName').value.trim();
    const telefono = document.getElementById('buyerPhone').value.trim();
    const vendedor = session.nombre;
    const nums     = [...selected].sort((a,b) => a-b);
    const codigo   = generateCode();
    const fecha    = new Date().toLocaleString('es-AR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const numKeys  = nums.map(n => String(n).padStart(4,'0'));

    const resultados = [];
    for (const numKey of numKeys) {
      await new Promise(resolve => {
        db.ref('vendidos/' + numKey).transaction(current => {
          if (current !== null) return;
          return { nombre, telefono, vendedor, fecha, codigoCompra: codigo };
        }, (err, committed) => {
          resultados.push({ num: numKey, ok: committed && !err });
          resolve();
        });
      });
    }

    const vendidosOk = resultados.filter(r => r.ok).map(r => r.num);
    const yaVendidos = resultados.filter(r => !r.ok).map(r => r.num);

    if (yaVendidos.length) {
      yaVendidos.forEach(n => { const i = parseInt(n); vendidos[i] = true; markSold(i); });
    }

    btn.textContent = '✔ Confirmar';

    if (!vendidosOk.length) {
      showToast('⚠️ Todos los números ya fueron vendidos');
      btn.disabled = false;
      return;
    }

    const compra = { numeros: vendidosOk, nombre, telefono, vendedor, fecha };
    await db.ref('compras/' + codigo).set(compra);
    await db.ref('codigos/' + codigo).set(vendidosOk);

    const base = window.location.href.replace(/\/[^/]*(\?.*)?$/, '/');
    const verifyUrl = base + 'verify.html?code=' + codigo;
    lastSale = { numeros: vendidosOk, nombre, vendedor, fecha, codigo, verifyUrl };
    // Guardar último recibo para poder recuperarlo
    localStorage.setItem('mbLastSale', JSON.stringify(lastSale));
    document.getElementById('btnLastQR').style.display = 'block';

    closeSale();
    clearSelection();

    if (yaVendidos.length) showToast(`⚠️ ${yaVendidos.length} número(s) ya estaban vendidos`);

    showQR(lastSale);
  }

  function reopenLastQR() {
    const saved = localStorage.getItem('mbLastSale');
    if (!saved) return;
    try { showQR(JSON.parse(saved)); } catch(e) {}
  }

  // Al iniciar app, mostrar el botón si hay un último recibo guardado
  function checkLastSale() {
    if (localStorage.getItem('mbLastSale')) {
      document.getElementById('btnLastQR').style.display = 'block';
    }
  }

  // ── QR ──────────────────────────────────────────────────
  function showQR(sale) {
    document.getElementById('qrNums').innerHTML =
      sale.numeros.map(n => `<span class="qr-num-chip">${n}</span>`).join('');
    document.getElementById('qrBuyer').textContent = sale.nombre;
    document.getElementById('qrMeta').textContent = `Vendedor: ${sale.vendedor} · ${sale.fecha}`;
    document.getElementById('qrUrlTxt').textContent = sale.verifyUrl;
    const box = document.getElementById('qrBox');
    box.innerHTML = '';
    new QRCode(box, { text: sale.verifyUrl, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('qrModal').classList.add('open');
  }

  function closeQr() {
    document.getElementById('qrModal').classList.remove('open');
    document.getElementById('qrBox').innerHTML = '';
  }

  function shareWA() {
    if (!lastSale) return;
    const nums = lastSale.numeros.join(', ');
    const msg = `🎟️ *Bono Festival MB*\n\n*Número${lastSale.numeros.length > 1 ? 's' : ''}: ${nums}*\nComprador: ${lastSale.nombre}\nFecha: ${lastSale.fecha}\n\n✅ Verificá tu compra:\n${lastSale.verifyUrl}`;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }

  // ── Utils ────────────────────────────────────────────────
  function generateCode() {
    return Array.from(crypto.getRandomValues(new Uint8Array(12)))
      .map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
  }

  let soloLibres = false;
  function toggleSoloLibres() {
    soloLibres = !soloLibres;
    const btn = document.getElementById('btnLibres');
    btn.textContent = soloLibres ? 'Ver todos' : 'Ver libres';
    btn.style.background = soloLibres ? 'rgba(255,255,255,.5)' : 'rgba(255,255,255,.2)';
    btn.style.color = soloLibres ? '#1a73e8' : '#fff';
    session.lotes.forEach(l => {
      for (let i = l.desde; i <= l.hasta; i++) {
        const el = document.getElementById('n' + i);
        if (!el) continue;
        if (soloLibres && vendidos[i]) {
          el.style.display = 'none';
        } else {
          el.style.display = '';
        }
      }
    });
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
