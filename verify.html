<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verificar Compra - Bono Festival MB</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f0f2f5;transition:background .5s}
  body.valid{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
  body.invalid{background:linear-gradient(135deg,#ffebee,#ffcdd2)}

  .card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:420px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .icon{font-size:64px;margin-bottom:12px;display:block}
  .status{font-size:22px;font-weight:800;margin-bottom:16px}
  .status.ok{color:#2e7d32}
  .status.fail{color:#c62828}

  .nums-container{margin:16px 0}
  .nums-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .nums-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .num-chip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:12px;padding:10px 18px;font-size:28px;font-weight:900;color:#1a73e8;letter-spacing:4px}

  .info-grid{background:#f8f9fa;border-radius:12px;padding:16px;text-align:left;margin:16px 0}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e8e8e8}
  .info-row:last-child{border-bottom:none}
  .info-label{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
  .info-value{font-size:15px;font-weight:600;color:#333;text-align:right;max-width:60%}

  .badge{border-radius:10px;padding:10px 20px;font-weight:700;font-size:15px;display:inline-block;margin-bottom:16px}
  .badge.ok{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}
  .badge.fail{background:#ffebee;color:#c62828;border:2px solid #ef9a9a}

  .footer{font-size:12px;color:#aaa;margin-top:16px}
  .spinner{width:44px;height:44px;border:4px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <p style="color:#777;margin-top:8px">Verificando...</p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCAxCy8vAijdXs-euawf2lh83nVvghayqU",
    authDomain: "bono-mb-v2.firebaseapp.com",
    databaseURL: "https://bono-mb-v2-default-rtdb.firebaseio.com",
    projectId: "bono-mb-v2",
    storageBucket: "bono-mb-v2.firebasestorage.app",
    messagingSenderId: "426895052978",
    appId: "1:426895052978:web:433f459af5509c1c8db9ab"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showValid(data) {
    const nums = Array.isArray(data.numeros) ? data.numeros : [data.numeros];
    const plural = nums.length > 1;
    const numChips = nums.map(n =>
      `<div class="num-chip">${esc(String(n).padStart(4,'0'))}</div>`
    ).join('');

    document.body.className = 'valid';
    document.getElementById('card').innerHTML = `
      <span class="icon">✅</span>
      <div class="status ok">${plural ? 'Compra Válida' : 'Número Válido'}</div>
      <div class="badge ok">✔ Compra verificada oficialmente</div>
      <div class="nums-container">
        <div class="nums-title">${plural ? `${nums.length} Números adquiridos` : 'Número adquirido'}</div>
        <div class="nums-grid">${numChips}</div>
      </div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-label">Comprador</span>
          <span class="info-value">${esc(data.nombre)}</span>
        </div>
        ${data.telefono ? `<div class="info-row">
          <span class="info-label">Teléfono</span>
          <span class="info-value">${esc(data.telefono)}</span>
        </div>` : ''}
        <div class="info-row">
          <span class="info-label">Vendedor</span>
          <span class="info-value">${esc(data.vendedor)}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Fecha</span>
          <span class="info-value">${esc(data.fecha)}</span>
        </div>
      </div>
      <div class="footer">
        <img src="logo.png" style="width:40px;vertical-align:middle;margin-right:6px;border-radius:4px" alt="ESCMB" onerror="this.style.display='none'">
        Bono Festival MB — Números registrados oficialmente
      </div>
    `;
  }

  function showInvalid() {
    document.body.className = 'invalid';
    document.getElementById('card').innerHTML = `
      <span class="icon">❌</span>
      <div class="status fail">Código No Encontrado</div>
      <div class="badge fail">✘ Código inválido o no registrado</div>
      <p style="color:#777;font-size:14px;margin-top:8px">
        Este código no corresponde a ninguna compra registrada.<br>
        Contactá al organizador del bono.
      </p>
      <div class="footer" style="margin-top:20px"><img src="logo.png" style="width:20px;vertical-align:middle;border-radius:3px;margin-right:4px" alt="">Bono Festival MB</div>
    `;
  }

  if (!code) {
    showInvalid();
  } else {
    db.ref('compras/' + code).once('value').then(snap => {
      if (snap.exists()) return showValid(snap.val());
      // Fallback compatibilidad con ventas v1
      return db.ref('codigos/' + code).once('value').then(snap2 => {
        if (!snap2.exists()) return showInvalid();
        const numKey = snap2.val();
        const firstKey = Array.isArray(numKey) ? numKey[0] : numKey;
        return db.ref('vendidos/' + firstKey).once('value').then(s3 => {
          if (!s3.exists()) return showInvalid();
          const nums = Array.isArray(numKey)
            ? numKey.map(k => parseInt(k, 10))
            : [parseInt(String(numKey), 10)];
          showValid({ numeros: nums, ...s3.val() });
        });
      });
    }).catch(() => {
      document.body.className = 'invalid';
      document.getElementById('card').innerHTML = `
        <span class="icon">⚠️</span>
        <div class="status fail">Error de conexión</div>
        <p style="color:#777;font-size:14px;margin-top:8px">No se pudo verificar. Revisá tu conexión e intentá de nuevo.</p>
      `;
    });
  }
</script>
</body>
</html>
